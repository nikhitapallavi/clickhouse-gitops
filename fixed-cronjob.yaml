apiVersion: batch/v1
kind: CronJob
metadata:
  name: goose-migrator
  namespace: db-migrations
spec:
  schedule: "*/15 * * * *"
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: OnFailure

          initContainers:
            - name: wait-for-clickhouse
              image: busybox:1.35
              command:
                - sh
                - -c
                - |
                  echo "Waiting for ClickHouse..."
                  until nc -z ${CLICKHOUSE_HOST} ${CLICKHOUSE_PORT}; do
                    sleep 3
                  done

              envFrom:
                - secretRef:
                    name: clickhouse-credentials

          containers:
            - name: goose
              image: pressly/goose:latest   # ✅ ONLY THIS IMAGE
              command:
                - /bin/sh
                - /scripts/run-migrations.sh

              envFrom:
                - secretRef:
                    name: clickhouse-credentials

              volumeMounts:
                - name: sql-migrations
                  mountPath: /migrations
                - name: runner-script
                  mountPath: /scripts

          volumes:
            - name: sql-migrations
              configMap:
                name: clickhouse-migrations
            - name: runner-script
              configMap:
                name: migration-script
